spring:
  application:
    name: server
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  autoconfigure:
    exclude:
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAudioSpeechAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAudioTranscriptionAutoConfiguration
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/blog?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      chat:
        options:
          model: deepseek-v4-flash
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      embedding:
        enabled: true
        options:
          model: text-embedding-v4
    vectorstore:
      qdrant:
        host: ${QDRANT_HOST:localhost}
        port: ${QDRANT_GRPC_PORT:6334}
        collection-name: ${QDRANT_COLLECTION:my-collection}
        initialize-schema: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      password: ${REDIS_PASSWORD:}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:blog}
    password: ${RABBITMQ_PASSWORD:change-me}
    listener:
      simple:
        default-requeue-rejected: false
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms
          multiplier: 2


knife4j:
  enable: true
  setting:
    language: zh_cn

r2:
  bucket: ${R2_BUCKET:}
  endpoint: ${R2_ENDPOINT:}
  region: ${R2_REGION:auto}
  public-domain: ${R2_PUBLIC_DOMAIN:}
  access-key: ${R2_ACCESS_KEY:}
  secret-key: ${R2_SECRET_KEY:}

jwt:
  secret: ${JWT_SECRET:}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  rag:
    transport: ${RAG_TRANSPORT:rabbitmq}
    search:
      top-k: ${RAG_SEARCH_TOP_K:6}
      document-top-k: ${RAG_DOCUMENT_SEARCH_TOP_K:30}
      similarity-threshold: ${RAG_SIMILARITY_THRESHOLD:0.2}
      document-similarity-threshold: ${RAG_DOCUMENT_SIMILARITY_THRESHOLD:0.0}
    rabbitmq:
      concurrency: ${RAG_RABBITMQ_CONCURRENCY:2}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
